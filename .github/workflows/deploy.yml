name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Push Build Artifacts to Production Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: production-files # Esta rama guardará solo el build
          folder: . # Subimos todo el repo + el build
          clean: true

      - name: Update Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export NODE_PATH=/opt/alt/alt-nodejs20/root/usr/bin
            cd domains/acap.ar/public_html
            
            # Cambiar a la rama de producción y traer los archivos listos
            git fetch origin production-files
            git checkout production-files
            git reset --hard origin/production-files
            
            # Instalar dependencias rápido
            $NODE_PATH/npm install --production --legacy-peer-deps
            
            # Reiniciar
            pkill -f next-server || true