name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Create Deployment Package
        # Comprimimos todo en un solo archivo para evitar errores de conexión
        run: tar -czf deploy.tar.gz .next/ public/ package.json package-lock.json next.config.mjs

      - name: Upload Package via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy.tar.gz"
          target: "domains/acap.ar/public_html"
          timeout: 60s

      - name: Extract and Restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export NODE_PATH=/opt/alt/alt-nodejs20/root/usr/bin
            cd domains/acap.ar/public_html
            
            # Descomprimir el paquete
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Instalar solo dependencias de producción
            $NODE_PATH/npm install --production --legacy-peer-deps
            
            # Reiniciar servidor
            pkill -f next-server || true