name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 1. Definir rutas a Node 20 y NPM de Hostinger
            export NODE_PATH=/opt/alt/alt-nodejs20/root/usr/bin
            export PATH=$NODE_PATH:$PATH

            # 2. Entrar a la carpeta del proyecto
            cd domains/acap.ar/public_html

            # 3. Bajar los cambios de GitHub
            git pull origin main

            # 4. Instalar y Compilar usando las rutas directas
            $NODE_PATH/npm install
            $NODE_PATH/npm run build

            # 5. Reiniciar el proceso para que se vean los cambios
            pkill -f next-server || true